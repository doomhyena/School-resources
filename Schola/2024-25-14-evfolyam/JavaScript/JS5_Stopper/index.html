<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="date"></h1>
        
        
        <div class="num">
            <h2 id="hour">00</h2>
            <h2>:</h2>

            <h2 id="min">00</h2>
            <h2>:</h2>

            <h2 id="sec">00</h2>
            <h2>:</h2>

            <h2 id="milli">00</h2>
            
        </div>

        <div class="btn">
            <button onclick="start()">Start</button>
            <button onclick="stop()">Stop</button>
            <button onclick="reset()">Alapba</button>
			<!--Lehetséges feladat: egy js függvény meghívása itt-->
        </div>
