<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com/css?family=Nunito' rel='stylesheet'>
    <title>Könyvtár</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="header-container">
    <header>
        <div id="button" onclick="KonyvHozzaad()">+</div>
        <h1 id="welcome">Felhasználói tárhely</h1>
    </header>
</div>
<div id="container">
    <div id="Konyv-tarto">
        <div class="Konyv">
            <div id="Konyv-fejlec">
                <img id="icon" src="kepek/TorlesIkon.svg" onclick="KonyvTorles()" alt="Törlés">
                <img id="icon" src="kepek/SzerkesztIkon.svg" onclick="KonyvSzerkesztes()" alt="Szerkesztés">
            </div>
            <h2 id="Konyv-text">The Hobbit</h2>
            <h4 id="Konyv-text">J. R. R. Tolkien</h4>
            <p id="Konyv-text">297 oldalak</p>
            <div class="toggle-button" onclick="toggleRead(this)">
                <div class="inner-circle"></div>
            </div>
        </div>
        <div class="Konyv">
            <div id="Konyv-fejlec">
                <img id="icon" src="kepek/TorlesIkon.svg" onclick="KonyvTorles()" alt="Törlés">
                <img id="icon" src="kepek/SzerkesztIkon.svg" onclick="KonyvSzerkesztes()" alt="Szerkesztés">
            </div>
            <h2 id="Konyv-text">Fahrenheit 451</h2>
            <h4 id="Konyv-text">Ray Bradbury</h4>
            <p id="Konyv-text">249 oldalak</p>
            <div class="toggle-button" onclick="toggleRead(this)">
                <div class="inner-circle"></div>
            </div>
        </div>
        <div class="Konyv">
            <div id="Konyv-fejlec">
                <img id="icon" src="kepek/TorlesIkon.svg" onclick="KonyvTorles()" alt="Törlés">
                <img id="icon" src="kepek/SzerkesztIkon.svg" onclick="KonyvSzerkesztes()" alt="Szerkesztés">
            </div>
            <h2 id="Konyv-text">Hunger Games</h2>
            <h4 id="Konyv-text">Suzanne Collins</h4>
            <p id="Konyv-text">374 oldalak</p>
            <div class="toggle-button" onclick="toggleRead(this)">
                <div class="inner-circle"></div>
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
