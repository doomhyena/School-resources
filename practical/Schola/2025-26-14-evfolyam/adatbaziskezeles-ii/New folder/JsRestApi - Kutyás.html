<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Kutyás képgaléria</title>
    <style>
        body { font-family: sans-serif; }
        .menu { margin-bottom: 1em; }
        .menu button { margin-right: 1em; }
        .dog-img { max-width: 400px; margin: 1em 0; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Kutyafajták menüje</h1>
    <div class="menu">
        <button onclick="kutyaBetoltese('akita')">Akita</button>
        <button onclick="kutyaBetoltese('beagle')">Beagle</button>
        <button onclick="kutyaBetoltese('boxer')">Boxer</button>
        <button onclick="kutyaBetoltese('dalmatian')">Dalmata</button>
        <button onclick="kutyaBetoltese('poodle')">Pudli</button>
    </div>
    <div id="content">
        <div id="breed-name"></div>
        <img id="dog-img" class="dog-img" src="" alt="" style="display: none;">
        <div id="error" class="error"></div>
        <button id="next-img" style="display: none;">Másik kép</button>
    </div>

    <script>
        let valasztottFajta = "";
        async function kutyaBetoltese(breed) {
            /*
            
                Aszinkron funkció:
                    - Olyan műveletekhez használjuk, amik nem azonnal futnak le, például egy külső API hívás.
                    - Az "await" kulcsszóval megvárjuk, amíg a művelet befejeződik, mielőtt továbblépnénk a következő sorra.
            
            */
            document.getElementById('error').innerText = "";
            document.getElementById('dog-img').style.display = "none";
            document.getElementById('next-img').style.display = "none";
            valasztottFajta = breed;
            document.getElementById('breed-name').innerText = breed.charAt(0).toUpperCase() + breed.slice(1);
            /*
                Try-catch: a try rész az alap ág, de ha nem fut le, akkor összeomlás helyett a 
                catch ág fut, ami általában egy sablon hibaüzenet szokott lenni
            */
            try {
                const response = await fetch(`https://dog.ceo/api/breed/${breed}/images/random`);
                // A külső api-ból a fetch parancs kéri be a tartalmat
                if (!response.ok) throw new Error("Hálózati hiba!");
                const data = await response.json();
                if (data.status !== "success") throw new Error("API hiba!");
                document.getElementById('dog-img').src = data.message;
                document.getElementById('dog-img').style.display = "block";
                document.getElementById('next-img').style.display = "inline";
            } catch (err) {
                document.getElementById('error').innerText = "Hiba történt: " + err.message;
            }
        }
        document.getElementById('next-img').onclick = () => kutyaBetoltese(valasztottFajta);
    </script>
</body>
</html>
