<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react?dev",
    "react-dom/client": "https://esm.sh/react-dom/client?dev"
  }
}
</script>
<script type="text/babel" data-type="module">
import React, { StrictMode } from 'react';
import { createRoot } from 'react-dom/client';

import { useState } from 'react';

function Negyzet({ value, negyzetreKattintaskor }) {
  return (
    <button className="negyzet" onClick={negyzetreKattintaskor}>
      {value}
    </button>
  );
}

function Tabla({ xKovetkezik, negyzetek, onPlay }) {
  function kattintasKezeles(i) {
    if (nyertesEldontes(negyzetek) || negyzetek[i]) {
      return;
    }
    const koviNegyzetek = negyzetek.slice();
    if (xKovetkezik) {
      koviNegyzetek[i] = 'X';
    } else {
      koviNegyzetek[i] = 'O';
    }
    onPlay(koviNegyzetek);
  }

  const nyertes = nyertesEldontes(negyzetek);
  let statusz;
  if (nyertes) {
    statusz = 'A nyertes: ' + nyertes;
  } else {
    statusz = 'Kövi játékos: ' + (xKovetkezik ? 'X' : 'O');
  }

  return (
    <>
      <div className="statusz">{statusz}</div>
      <div className="board-row">
        <Negyzet value={negyzetek[0]} negyzetreKattintaskor={() => kattintasKezeles(0)} />
        <Negyzet value={negyzetek[1]} negyzetreKattintaskor={() => kattintasKezeles(1)} />
        <Negyzet value={negyzetek[2]} negyzetreKattintaskor={() => kattintasKezeles(2)} />
      </div>
      <div className="board-row">
        <Negyzet value={negyzetek[3]} negyzetreKattintaskor={() => kattintasKezeles(3)} />
        <Negyzet value={negyzetek[4]} negyzetreKattintaskor={() => kattintasKezeles(4)} />
        <Negyzet value={negyzetek[5]} negyzetreKattintaskor={() => kattintasKezeles(5)} />
      </div>
      <div className="board-row">
        <Negyzet value={negyzetek[6]} negyzetreKattintaskor={() => kattintasKezeles(6)} />
        <Negyzet value={negyzetek[7]} negyzetreKattintaskor={() => kattintasKezeles(7)} />
        <Negyzet value={negyzetek[8]} negyzetreKattintaskor={() => kattintasKezeles(8)} />
      </div>
    </>
  );
}

let App = function Game() {
  const [eddigiek, eddigiekre] = useState([Array(9).fill(null)]);
  const [currentMove, jelenlegiLepesBeallitasa] = useState(0);
  const xKovetkezik = currentMove % 2 === 0;
  const jelenlegiNegyzetek = eddigiek[currentMove];

  function jatekKezeles(koviNegyzetek) {
    const kovEddigi = [...eddigiek.slice(0, currentMove + 1), koviNegyzetek];
    eddigiekre(kovEddigi);
    jelenlegiLepesBeallitasa(kovEddigi.length - 1);
  }

  function ugras(koviLepes) {
    jelenlegiLepesBeallitasa(koviLepes);
  }

  const lepesek = eddigiek.map((negyzetek, lepes) => {
    let leiras;
    if (lepes > 0) {
      leiras = 'Ugrás a #' + lepes;
    } else {
      leiras = 'Ugrás az elejére';
    }
    return (
      <li key={lepes}>
        <button onClick={() => ugras(lepes)}>{leiras}</button>
      </li>
    );
  });

  return (
    <div className="jatek">
      <div className="jatek-board">
        <Tabla xKovetkezik={xKovetkezik} negyzetek={jelenlegiNegyzetek} onPlay={jatekKezeles} />
      </div>
      <div className="jatek-info">
        <ol>{lepesek}</ol>
      </div>
    </div>
  );
}

function nyertesEldontes(negyzetek) {
  const nyertesVonalak = [
    [0, 1, 2],
    [3, 4, 5],
    [6, 7, 8],
    [0, 3, 6],
    [1, 4, 7],
    [2, 5, 8],
    [0, 4, 8],
    [2, 4, 6],
  ];
  for (let i = 0; i < nyertesVonalak.length; i++) {
    const [a, b, c] = nyertesVonalak[i];
    if (negyzetek[a] && negyzetek[a] === negyzetek[b] && negyzetek[a] === negyzetek[c]) {
      return negyzetek[a];
    }
  }
  return null;
}


const root = createRoot(document.getElementById('root'));
root.render(
  <StrictMode>
    <App />
  </StrictMode>
);
</script>
