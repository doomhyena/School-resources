<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Jegyzetes App</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
</head>
<body>
  <div id="app" class="note-app">
    <h1>Jegyzetes App</h1>
    <input v-model="newNote" placeholder="Gépelj ide" type="text">
    <button @click="addNote">Hozzáad</button>
    <ul>
      <li v-for="(note, index) in notes" :key="note.id">
        <div v-if="editingNoteId !== note.id">
          <span>{{ note.text }}</span>
          <span class="note-date">({{ note.date }})</span>
          <button @click="editNote(note.id)">Szerkeszt</button>
          <button @click="deleteNote(note.id)">Töröl</button>
        </div>
        <div v-else>
          <input v-model="editedText" type="text">
          <button @click="saveNote(note.id)">Mentés</button>
          <button @click="cancelEdit">Vissza</button>
        </div>
      </li>
    </ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
