<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=360, initial-scale=1" />
    <title></title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Pacifico"
    />
    <link rel="stylesheet" href="forma.css" />
  </head>

  <body>
    <main class="main-container">
      <section class="section">
        <h2 class="text-center">Kínálat</h2>
        <div class="termekek">
          <div class="termek">
            <img
              class="termek__image"
              src="img/termekek/cold-drink.svg"
              width="100"
              height="100"
              alt="soft drink"
            />
            <h2 class="termek__name">Üdítő</h2>
            <h3 class="termek__price">6.00</h3>
            <button class="btn btn--primary" data-action="ADD_TO_kosar">
              Hozzáad
            </button>
          </div>
          <div class="termek">
            <img class="termek__image" src="img/termekek/tea.svg" alt="Tea" />
            <h2 class="termek__name">Tea</h2>
            <h3 class="termek__price">5.00</h3>
            <button class="btn btn--primary" data-action="ADD_TO_kosar">
              Hozzáad
            </button>
          </div>
          <div class="termek">
            <img
              class="termek__image"
              src="img/termekek/cola.svg"
              alt="Cola"
            />
            <h2 class="termek__name">Kóla</h2>
            <h3 class="termek__price">4.00</h3>
            <button class="btn btn--primary" data-action="ADD_TO_kosar">
              Hozzáad
            </button>
          </div>
          <div class="termek">
            <img
              class="termek__image"
              src="img/termekek/milk.svg"
              alt="Milk"
            />
            <h2 class="termek__name">Tej</h2>
            <h3 class="termek__price">2.50</h3>
            <button class="btn btn--primary" data-action="ADD_TO_kosar">
              Hozzáad
            </button>
          </div>
          <div class="termek">
            <img
              class="termek__image"
              src="img/termekek/mineral-water.svg"
              alt="Mineral Water"
            />
            <h2 class="termek__name">Ásványvíz</h2>
            <h3 class="termek__price">1.00</h3>
            <button class="btn btn--primary" data-action="ADD_TO_kosar">
              Hozzáad
            </button>
          </div>
          <div class="termek">
            <img
              class="termek__image"
              src="img/termekek/smoothie.svg"
              alt="Smoothie"
            />
            <h2 class="termek__name">Turmix</h2>
            <h3 class="termek__price">6.00</h3>
            <button class="btn btn--primary" data-action="ADD_TO_kosar">
              Hozzáad
            </button>
          </div>
        </div>
      </section>

      <section class="section">
        <h2 class="text-center">Kosár</h2>
        <div class="kosar"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
