<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Önéletrajz Készítő</title>
  <link rel="stylesheet" href="style.css">
  <!--jsPDF könyvtár a PDF generáláshoz-->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <header class="fejlec">
    <h1>Önéletrajz Készítő</h1>
  </header>
  <section class="kontener">
    <form id="oneletrajzForm">
      <fieldset>
        <legend>Személyes adatok</legend>
        <label for="nev">Név:</label>
        <input type="text" id="nev" required>
        
        <label for="email">Email:</label>
        <input type="email" id="email" required>
        
        <label for="telefon">Telefonszám:</label>
        <input type="text" id="telefon" required>
        
        <label for="cim">Cím:</label>
        <input type="text" id="cim" required>
        
        <label for="bemutatkozas">Bemutatkozás:</label>
        <textarea id="bemutatkozas" rows="4" placeholder="Írj néhány mondatot magadról..."></textarea>
      </fieldset>
      
      <fieldset>
        <legend>Oktatás</legend>
        <label for="oktatas">Iskolák, végzettségek:</label>
        <textarea id="oktatas" rows="4" placeholder="Pl.: XYZ Egyetem, ABC Gimnázium"></textarea>
      </fieldset>
      
      <fieldset>
        <legend>Szakmai tapasztalat</legend>
        <label for="tapasztalat">Munkatapasztalat:</label>
        <textarea id="tapasztalat" rows="4" placeholder="Korábbi munkahelyek, pozíciók..."></textarea>
      </fieldset>
      
      <fieldset>
        <legend>Készségek</legend>
        <label for="keszsegek">Felsorolás (vesszővel elválasztva):</label>
        <input type="text" id="keszsegek" placeholder="Pl.: JavaScript, HTML, CSS">
      </fieldset>
      
      <button type="button" id="pdfGeneralas">Önéletrajz PDF generálása</button>
    </form>
  </section>
  <script src="script.js"></script>
</body>
</html>
