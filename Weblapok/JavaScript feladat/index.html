<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <link href="https://fonts.googleapis.com/css?family=Londrina+Outline|Sniglet" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" type="text/css">
</head>
<body>
    <div id="container">
        <div id="splash" class="screen">
            <h1>20<span class="char1">4</span><span class="char2">8</span></h1>
            <button id="start" onclick="start()">Új játék</button>
        </div>
        <div id="szunetel" class="screen">
            <h1>Megállítva</h1>
            <button onclick="ujrarak()">Újra</button>
            <button onclick="folytat()">Folytat</button>
        </div>
        <div id="end" class="screen">Kész</div>
        <div id="jatek" class="screen">
            <h1>2048</h1>
            <div id="info">Pontok:
                <span id="pontok"></span>
                <button type="button" id="szunetelbtn" onclick="szunetel()">szünet</button>
            </div>
            <div id="jatekarea">
                <div class="element"></div>
                <div class="element"></div>
                <div class="element"></div>
                <div class="element"></div>
                <div class="element"></div>
                <div class="element"></div>
                <div class="element"></div>
                <div class="element"></div>
                <div class="element"></div>
                <div class="element"></div>
                <div class="element"></div>
                <div class="element"></div>
                <div class="element"></div>
                <div class="element"></div>
                <div class="element"></div>
                <div class="element"></div>
            </div>
        </div>
    </div>
    <div id="control">
        <h2>Irányítás</h2>
        <button onclick="left()">Bal</button>
        <button onclick="up()">Fel</button>
        <button onclick="down()">Le</button>
        <button onclick="right()">Jobb</button>
    </div>
    <p>A nyíl gombokat is használhatod!</p>
<script src="script.js"></script>
</body>
</html>
